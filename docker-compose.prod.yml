services:
  postgres:
    ports:
      - "5434:5432"           # 5433 taken by another project on this host

  redis:
    ports:
      - "127.0.0.1:6381:6379"

  api:
    ports:
      - "127.0.0.1:8001:8000"
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000

  worker:
    volumes:
      - /data/images:/data/images

  bot:
    ports:
      - "127.0.0.1:8081:8080"

  nginx:
    profiles:
      - disabled              # system nginx handles SSL on this host
