services:
  postgres:
    ports: []                 # no host binding needed — internal Docker network only

  redis:
    ports: []                 # no host binding needed — internal Docker network only

  api:
    ports:
      - "127.0.0.1:8001:8000"
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000

  worker:
    volumes:
      - /data/images:/data/images

  bot:
    ports:
      - "127.0.0.1:8081:8080"

  nginx:
    profiles:
      - disabled              # system nginx handles SSL on this host
